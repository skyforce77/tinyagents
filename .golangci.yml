version: "2"
run:
  timeout: 5m
  go: "1.24"
linters:
  default: none
  enable:
    - errcheck
    - gosec
    - govet
    - ineffassign
    - revive
    - staticcheck
    - unused
  settings:
    gosec:
      # G115 — integer overflow from int -> uint in hash-modulo conversions is
      # bounded by construction; G404 — pkg/router uses math/rand for a
      # non-cryptographic worker pick. G118 (cancel funcs stored in struct
      # fields, not leaked) is excluded via per-file rules below because the
      # rule id isn't known to all gosec versions.
      excludes:
        - G115
        - G404
    revive:
      rules:
        - name: exported
          disabled: false
        - name: var-naming
        - name: unused-parameter
          disabled: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - gosec
        path: _test\.go
      # actor.ActorFunc is a stable public name that mirrors the
      # http.HandlerFunc convention; the revive exported-stutter check
      # would suggest renaming to actor.Func which is a gratuitous API break.
      - linters:
          - revive
        path: pkg/actor/actor\.go
        text: 'type name will be used as actor\.ActorFunc'
      # G118 (cancel function from WithCancel never called) is a false
      # positive in pkg/actor/system.go and pkg/transport/tcp/tcp.go where
      # the cancel func is stored in a struct field for later invocation.
      - linters:
          - gosec
        path: pkg/actor/system\.go
        text: 'G118'
      - linters:
          - gosec
        path: pkg/transport/tcp/tcp\.go
        text: 'G118'
    paths:
      - third_party$
      - builtin$
formatters:
  enable:
    - gofmt
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
